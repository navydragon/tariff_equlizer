{% extends "base.html" %}

{% block content %}
<div class="page-header d-print-none">
  <div class="row align-items-center">
    <div class="col">
      <h2 class="page-title">Редактирование сценария: {{ scenario.name }}</h2>
      <div class="text-muted mt-1">

      </div>
    </div>
    <div class="col-auto">
      <a href="{% url 'scenarios:management' %}" class="btn btn-secondary">
        <i class="ti ti-arrow-left"></i>

      </a>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="container-xl">
    {% include "scenarios/_edit_scenario_content.html" %}
  </div>
</div>
{% endblock %}
