<style>
  .tariff-rule-condition-line + .tariff-rule-condition-line {
    margin-top: 0.35rem;
  }

  .tariff-rules-modal .modal-body {
    padding-bottom: 2rem;
  }

  .tariff-rules-modal .tariff-rules-years-block {
    margin-bottom: 0.5rem;
  }

  .tariff-rule-condition-row .tariff-rule-condition-delete {
    padding-top: 1.875rem;
  }

  .tariff-rule-condition-row [data-condition-values-wrap] .form-text {
    margin-top: 0.25rem;
    margin-bottom: 0;
    line-height: 1.35;
  }
</style>

<div class="card">
  <div class="card-header">
    <h3 class="card-title">Отдельные тарифные решения</h3>
  </div>
  <div class="card-body">
    <div
      data-controller="tariff-rules"
      data-tariff-rules-scenario-id-value="{{ scenario.id }}"
      data-tariff-rules-list-url-value="{% url 'scenarios:tariff_rule_list' scenario.id %}"
      data-tariff-rules-create-url-value="{% url 'scenarios:tariff_rule_create' scenario.id %}"
      data-tariff-rules-detail-url-template-value="{% url 'scenarios:tariff_rule_detail' 0 %}"
      data-tariff-rules-update-url-template-value="{% url 'scenarios:tariff_rule_update' 0 %}"
      data-tariff-rules-delete-url-template-value="{% url 'scenarios:tariff_rule_delete' 0 %}"
      data-tariff-rules-options-url-template-value="{% url 'scenarios:tariff_rule_options' scenario.id %}"
      data-tariff-rules-stats-url-value="{% url 'scenarios:tariff_rule_stats' scenario.id %}"
      data-tariff-rules-start-year-value="{{ scenario.start_year }}"
      data-tariff-rules-end-year-value="{{ scenario.end_year }}"
    >
      <div class="d-flex gap-2 align-items-center mb-3">
        <button type="button" class="btn btn-primary" data-action="tariff-rules#openCreate">
          <i class="ti ti-plus"></i>
          Добавить
        </button>
        <div class="ms-auto text-muted" data-tariff-rules-target="summary"></div>
      </div>

      <div class="table-responsive">
        <table class="table table-vcenter">
          <thead>
            <tr>
              <th style="width: 56px;">#</th>
              <th style="min-width: 180px;">Название</th>
              <th style="min-width: 280px;">Условия (категории маршрутов)</th>
              <th style="min-width: 160px;">Коэффициенты по годам</th>
              <th style="width: 120px;">% базы</th>
              <th class="text-end" style="width: 200px;">Действия</th>
            </tr>
          </thead>
          <tbody data-tariff-rules-target="tbody">
            <tr>
              <td colspan="6" class="text-muted">Загрузка...</td>
            </tr>
          </tbody>
        </table>
      </div>

      {# Modal #}
      <div class="modal fade" tabindex="-1" aria-hidden="true" data-tariff-rules-target="modal">
        <div class="modal-dialog modal-xl modal-dialog-scrollable tariff-rules-modal">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" data-tariff-rules-target="modalTitle">Добавить тарифное решение</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div data-tariff-rules-target="errors"></div>

              <div class="mb-3">
                <label class="form-label" for="tariffRuleName">Название решения *</label>
                <input id="tariffRuleName" type="text" class="form-control" data-tariff-rules-target="name" required />
              </div>

              <div class="mb-3">
                <div class="d-flex align-items-center">
                  <h4 class="mb-0">Введите условия</h4>
                  <button type="button" class="btn btn-sm btn-outline-primary ms-auto" data-action="tariff-rules#addCondition">
                    <i class="ti ti-plus"></i>
                    Добавить условие
                  </button>
                </div>
                <div class="mt-3" data-tariff-rules-target="conditions"></div>
                <div class="mt-2 text-muted" data-tariff-rules-target="coverage">
                  Покрытие по маршрутам: —
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label" for="tariffRuleBasePercentInput">% покрытия базы</label>
                <div class="row g-2 align-items-center">
                  <div class="col">
                    <input id="tariffRuleBasePercentRange" type="range" class="form-range" min="0" max="200" step="1" data-action="input->tariff-rules#syncBasePercentFromRange" data-tariff-rules-target="basePercentRange" />
                  </div>
                  <div class="col-auto" style="width: 140px;">
                    <input id="tariffRuleBasePercentInput" type="number" class="form-control" min="0" max="200" step="1" data-action="input->tariff-rules#syncBasePercentFromInput" data-tariff-rules-target="basePercentInput" />
                  </div>
                </div>
              </div>

              <div class="mb-2 tariff-rules-years-block">
                <h4 class="mb-2">Коэффициенты по годам</h4>
                <div class="row g-2 row-cols-2 row-cols-sm-4 row-cols-lg-4" data-tariff-rules-target="years"></div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
              <button type="button" class="btn btn-primary" data-action="tariff-rules#save" data-tariff-rules-target="saveBtn">
                <i class="ti ti-device-floppy"></i>
                Сохранить
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
