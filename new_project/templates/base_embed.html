<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}Цифровой тарифный инструментарий{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler-flags.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler-payments.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler-vendors.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css"
    />

    <style>
      .ts-dropdown,
      .ts-dropdown .ts-dropdown-content {
        background-color: #ffffff !important;
      }

      .ts-dropdown .ts-dropdown-content .option {
        background-color: #ffffff !important;
      }

      .ts-dropdown .ts-dropdown-content .option:hover,
      .ts-dropdown .ts-dropdown-content .option.active {
        background-color: #f1f3f5 !important;
      }

      html,
      body {
        height: 100%;
      }

      body.embed-layout {
        overflow: auto;
      }
    </style>

    {% block extra_css %}{% endblock %}

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="https://unpkg.com/@hotwired/stimulus/dist/stimulus.umd.js"></script>
    {% load static %}
    <script src="{% static 'core/js/app/bootstrap.js' %}"></script>
    <script
      type="module"
      src="{% static 'core/js/app/controllers/scenario_edit_controller.js' %}"
    ></script>
    <script
      type="module"
      src="{% static 'core/js/app/controllers/tariff_rules_controller.js' %}"
    ></script>
  </head>
  <body class="embed-layout">
    <div class="page">
      <div class="page-wrapper">
        <div class="page-body py-3">
          <div class="container-xl">
            {% block content %}{% endblock %}
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
