{% extends "base.html" %}

{% block title %}Главная · Цифровой тарифный инструментарий{% endblock %}

{% block content %}
<div class="page-header d-print-none">
  <div class="row align-items-center">
    <div class="col">
      <h2 class="page-title">Главная</h2>
      <div class="text-muted mt-1">
        Выберите раздел
      </div>
    </div>
  </div>
</div>

<div class="row row-cards mt-3">
  {% for item in menu_items %}
    <div class="col-md-6 col-lg-3">
      <a
        class="card card-sm card-link"
        href="{% if item.title == 'Анализ маршрута' %}{% url 'route_analysis' %}{% elif item.title == 'Управление сценариями' %}{% url 'scenarios:management' %}{% elif item.title == 'Справочники' %}{% url 'references' %}{% else %}#{% endif %}"
      >
        <div class="card-body">
          <div class="d-flex align-items-center">
            <span class="avatar me-3 bg-primary-lt">
              <i class="ti {{ item.icon }}"></i>
            </span>
            <div>
              <div class="fw-bold">{{ item.title }}</div>
              <div class="text-muted">Открыть</div>
            </div>
          </div>
        </div>
      </a>
    </div>
  {% empty %}
    <div class="col-12">
      <div class="alert alert-warning">Меню пустое.</div>
    </div>
  {% endfor %}
</div>
{% endblock %}
