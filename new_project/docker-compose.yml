services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tariff_equlizer}
      POSTGRES_USER: ${POSTGRES_USER:-tariff_equlizer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tariff_equlizer}
    ports:
      - "5432:5432"
    volumes:
      - tariff_pg_data:/var/lib/postgresql/data

volumes:
  tariff_pg_data:

